name: Sync Carbon tree-sitter files

on:
  schedule:
    - cron: "0 0 * * 4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-carbon-tree-sitter
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install tree-sitter
        run: npm install --global tree-sitter-cli

      - name: Install Carbon dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libc++-dev libc++abi-dev lld libunwind-dev

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Clone carbon-lang
        run: git clone --depth 1 https://github.com/carbon-language/carbon-lang.git "$RUNNER_TEMP/carbon-lang"

      - name: Build parser files
        working-directory: ${{ runner.temp }}/carbon-lang
        run: ./scripts/run_bazelisk.py build //utils/tree_sitter:parser --strategy=Genrule=local --action_env=PATH

      - name: Replace generated files
        run: |
          rsync -a --delete \
            "$RUNNER_TEMP/carbon-lang/utils/tree_sitter/src/" \
            "$GITHUB_WORKSPACE/src/"
          rsync -a --delete \
            "$RUNNER_TEMP/carbon-lang/utils/tree_sitter/grammar.js" \
            "$GITHUB_WORKSPACE/grammar.js"

      - name: Patch scanner include
        run: |
          test "$(sed -n '4p' src/scanner.c)" = '#include "utils/tree_sitter/src/tree_sitter/parser.h"'
          sed -i '4s|#include "utils/tree_sitter/src/tree_sitter/parser.h"|#include "./tree_sitter/parser.h"|' src/scanner.c

      - name: Generate parser files
        run: |
          tree-sitter generate

      - name: Commit sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No parser file changes to commit."
          else
            git commit -m "Sync tree-sitter parser files from carbon-lang"
            git push
          fi
